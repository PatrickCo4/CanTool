name: build

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install esptool deps
        run: pip install pyserial reedsolo cryptography ecdsa bitstring
      - name: Install arduino-cli
        run: |
          curl -fsSL https://raw.githubusercontent.com/arduino/arduino-cli/master/install.sh | sh
          echo "$PWD/bin" >> "$GITHUB_PATH"
      - name: Install ESP32 core
        run: |
          arduino-cli config init
          arduino-cli config add board_manager.additional_urls https://espressif.github.io/arduino-esp32/package_esp32_index.json
          arduino-cli core update-index
          arduino-cli core install esp32:esp32@3.0.7
      - name: Generate webpage.h from index.html
        run: python3 gen_webpage.py CanTool/index.html CanTool/webpage.h
      - name: Compile
        run: |
          arduino-cli compile \
            --fqbn "esp32:esp32:esp32s3:PSRAM=disabled,FlashMode=qio,FlashSize=4M,CDCOnBoot=cdc,PartitionScheme=huge_app" \
            --output-dir build \
            CanTool
      - uses: actions/upload-artifact@v4
        with:
          name: CanTool-firmware
          path: build/*.bin
